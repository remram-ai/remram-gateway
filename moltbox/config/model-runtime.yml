# Moltbox model runtime policy.
# Local model handles orchestration/routing; cloud handles deep reasoning.

runtime:
  local_routing:
    provider: ollama
    model: qwen3:8b
    role: orchestration_routing_only
    endpoint_env: OLLAMA_BASE_URL

  cloud_reasoning:
    provider: together
    model_env: CLOUD_REASONING_MODEL
    api_key_env: TOGETHER_API_KEY
    role: escalation_reasoning

  deep_thinking:
    provider: together
    model_env: DEEP_THINKING_MODEL
    api_key_env: TOGETHER_API_KEY
    invoke_mode: tool_explicit_only

  coding:
    provider: together
    model_env: CODING_MODEL
    api_key_env: TOGETHER_API_KEY
    invoke_mode: deterministic_tool_only

governance:
  max_tokens_per_request_env: ESCALATION_MAX_TOKENS
  daily_spend_usd_cap_env: ESCALATION_DAILY_USD_CAP
  escalation_timeout_ms_env: ESCALATION_TIMEOUT_MS

degradation:
  local_failure_action: halt
  cloud_unavailable_action: bounded_local_only_mode

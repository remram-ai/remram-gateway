# Moltbox appliance stack.
# Only the OpenClaw gateway is published to the host/LAN.
services:
  openclaw:
    image: "${OPENCLAW_IMAGE:-openclaw:local}"
    container_name: "moltbox-openclaw"
    restart: unless-stopped
    init: true
    env_file:
      - "${MOLTBOX_RUNTIME_ROOT:-$HOME/.openclaw}/.env"
      - "${MOLTBOX_RUNTIME_ROOT:-$HOME/.openclaw}/container.env"
    environment:
      # OpenClaw runtime defaults expected by the upstream Docker flow.
      HOME: /home/node
      TERM: xterm-256color
    ports:
      - "${GATEWAY_PORT:-18789}:18789"
    depends_on:
      ollama:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    volumes:
      # OpenClaw runtime policy/config bundle lives outside the repository.
      - "${MOLTBOX_RUNTIME_ROOT:-$HOME/.openclaw}:/home/node/.openclaw"
      # Tiered model routing policy is loaded from runtime config.
      - "${MOLTBOX_RUNTIME_ROOT:-$HOME/.openclaw}/model-runtime.yml:/app/config/model-runtime.yml:ro"
      # Canonical Remram packet schema is mounted read-only from the repository.
      - "../../schemas:/app/remram-gateway/schemas:ro"
    networks:
      - moltbox_internal
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  ollama:
    image: "${OLLAMA_IMAGE:-ollama/ollama:0.6.8}"
    container_name: "moltbox-ollama"
    restart: unless-stopped
    env_file:
      - "${MOLTBOX_RUNTIME_ROOT:-$HOME/.openclaw}/.env"
      - "${MOLTBOX_RUNTIME_ROOT:-$HOME/.openclaw}/container.env"
    # GPU is required for local routing performance.
    gpus: all
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - moltbox_internal
    healthcheck:
      test:
        ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 8s
      retries: 10
      start_period: 25s

  opensearch:
    image: "${OPENSEARCH_IMAGE:-opensearchproject/opensearch:2.18.0}"
    container_name: "moltbox-opensearch"
    restart: unless-stopped
    env_file:
      - "${MOLTBOX_RUNTIME_ROOT:-$HOME/.openclaw}/.env"
      - "${MOLTBOX_RUNTIME_ROOT:-$HOME/.openclaw}/container.env"
    environment:
      # Heap sizing is controlled by .env.
      OPENSEARCH_JAVA_OPTS: "${OPENSEARCH_JAVA_OPTS:--Xms2g -Xmx2g}"
      # Runtime posture is locked to single-node internal MVP.
      discovery.type: "${DISCOVERY_TYPE:-single-node}"
      plugins.security.disabled: "${PLUGINS_SECURITY_DISABLED:-true}"
    volumes:
      - "${MOLTBOX_RUNTIME_ROOT:-$HOME/.openclaw}/opensearch.yml:/usr/share/opensearch/config/opensearch.yml:ro"
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - moltbox_internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/9200' >/dev/null 2>&1 || exit 1",
        ]
      interval: 20s
      timeout: 8s
      retries: 15
      start_period: 35s

volumes:
  # Persistent local model cache.
  ollama_data:
  # Persistent OpenSearch state.
  opensearch_data:

networks:
  # Internal appliance network for service-to-service traffic.
  moltbox_internal:
    driver: bridge
